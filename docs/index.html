<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tin247 · Tổng Hợp Tin Tức AI</title>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0d0f14; --bg2: #13161e; --bg3: #1a1e2a;
  --border: #252a38; --accent: #4f8ef7; --accent2: #f7a94f;
  --accent3: #4ff7a0; --text: #e8eaf0; --text2: #8b90a0;
  --text3: #555b6e; --danger: #f74f4f; --r: 12px;
  --hot: #f74f4f; --warm: #f7a94f; --cool: #4f8ef7;
  --sidebar-h: 700px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { 
  background:var(--bg); color:var(--text); 
  font-family:'Be Vietnam Pro',sans-serif; 
  font-size:14px; line-height:1.6; 
  -webkit-font-smoothing: antialiased;
}

::-webkit-scrollbar { width: 8px; height: 8px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: var(--accent); }

@keyframes fadeInUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
@keyframes slideInRight { from { opacity:0; transform:translateX(-20px); } to { opacity:1; transform:translateX(0); } }
@keyframes pulseGlow { 0%,100% { box-shadow:0 0 0 rgba(247,79,79,0); } 50% { box-shadow:0 0 15px rgba(247,79,79,.3); } }
@keyframes progressFill { from { width:0; } }
@keyframes spin { to { transform:rotate(360deg); } }

.fade-in { animation:fadeInUp .5s ease-out both; }
.stagger-1 { animation-delay:.1s; } .stagger-2 { animation-delay:.2s; }
.stagger-3 { animation-delay:.3s; } .stagger-4 { animation-delay:.4s; }

.topbar {
  position:sticky; top:0; z-index:100;
  background:rgba(13,15,20,0.95); backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);
  height:60px; padding:0 32px;
  display:flex; align-items:center; gap:16px;
}
.logo { font-family:'Playfair Display',serif; font-size:22px; font-weight:900; white-space:nowrap; letter-spacing: -0.5px; }
.logo span { color:var(--accent); }
.topbar-meta { flex:1; font-size:12px; color:var(--text3); }
.date-nav { display:flex; align-items:center; gap:8px; }
.nav-btn {
  background:var(--bg3); border:1px solid var(--border); color:var(--text2);
  width:32px; height:32px; border-radius:8px; font-size:16px;
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; transition:.2s;
}
.nav-btn:hover { background:var(--accent); color:#fff; border-color:var(--accent); }
.nav-btn:disabled { opacity:.3; cursor:not-allowed; }
#datePicker {
  background:var(--bg3); border:1px solid var(--border);
  color:var(--text); padding:6px 12px; border-radius:8px;
  font-size:12px; font-family:inherit; cursor:pointer;
}
.btn-refresh {
  background:var(--accent); color:#fff; border:none;
  padding:8px 18px; border-radius:8px; font-size:12px;
  font-family:inherit; font-weight:600; cursor:pointer;
  display:flex; align-items:center; gap:6px; transition: .2s;
}
.btn-refresh:hover { opacity:.85; transform: translateY(-1px); }
.btn-refresh.loading { opacity:.6; pointer-events:none; }
.spin { animation:spin .8s linear infinite; display:inline-block; }

.wrap { max-width:1440px; margin:0 auto; padding:24px 32px; }

.digest {
  background:linear-gradient(135deg,var(--bg2),#1a1e35);
  border:1px solid var(--border); border-left:4px solid var(--accent);
  border-radius:var(--r); padding:28px 32px; margin-bottom:24px;
  position:relative; overflow:hidden;
}
.digest::before {
  content:""; position:absolute; top:0; right:0; width:250px; height:250px;
  background:radial-gradient(circle,rgba(79,142,247,.08) 0%,transparent 70%);
  pointer-events:none;
}
.digest-label {
  font-size:11px; font-weight:700; letter-spacing:2px; color:var(--accent);
  text-transform:uppercase; margin-bottom:12px;
  display:flex; align-items:center; gap:8px;
}
.digest-label::before {
  content:""; width:8px; height:8px; background:var(--accent); border-radius:50%;
  animation:pulseGlow 2s infinite;
}
.digest-h { font-family:'Playfair Display',serif; font-size:26px; font-weight:700; line-height:1.3; margin-bottom:14px; }
.digest-p { font-size:14px; color:var(--text2); line-height:1.7; margin-bottom:16px; max-width: 900px; }
.digest-tags { display:flex; flex-wrap:wrap; gap:8px; }
.digest-tag {
  background:var(--bg3); border:1px solid var(--border);
  border-radius:20px; padding:5px 14px; font-size:12px; color:var(--text2);
  transition:.2s;
}
.digest-tag:hover { border-color:var(--accent); color:var(--accent); }
.digest-tag::before { content:"• "; color:var(--accent); }
.digest-groups { display:grid; grid-template-columns:repeat(auto-fit,minmax(240px,1fr)); gap:16px; margin-top:20px; padding-top:20px; border-top:1px solid var(--border); }
.dg-item {
  background:rgba(0,0,0,0.2); border-radius:10px; padding:16px;
  border-left:3px solid var(--accent); transition:.2s;
}
.dg-item:hover { background:rgba(79,142,247,.05); transform:translateX(3px); }
.dg-name { font-size:11px; font-weight:700; color:var(--accent); text-transform:uppercase; letter-spacing:0.5px; margin-bottom:8px; }
.dg-text { font-size:13px; color:var(--text2); line-height:1.6; }

.stats { display:grid; grid-template-columns:repeat(4,1fr); gap:16px; margin-bottom:24px; }
.stat {
  background:var(--bg2); border:1px solid var(--border); border-radius:var(--r);
  padding:20px; text-align:center; position:relative; overflow:hidden;
  transition:.3s; min-height: 110px;
  display: flex; flex-direction: column; justify-content: center; align-items: center;
}
.stat:hover { transform:translateY(-4px); border-color:var(--accent); box-shadow: 0 8px 24px rgba(79, 142, 247, 0.1); }
.stat::before {
  content:""; position:absolute; top:0; left:0; right:0; height:3px;
  background:linear-gradient(90deg,var(--accent),var(--accent2));
  transform:scaleX(0); transition:.3s;
}
.stat:hover::before { transform:scaleX(1); }
.stat-ic { font-size:24px; margin-bottom:10px; opacity: 0.9; }
.stat-n {
  font-family:'Playfair Display',serif; font-size:34px; font-weight:700;
  color:var(--accent); line-height:1; margin-bottom: 6px;
}
.stat:nth-child(2) .stat-n { color:var(--accent2); }
.stat:nth-child(3) .stat-n { color:var(--accent3); }
.stat:nth-child(4) .stat-n { color:#a04ff7; }
.stat-l { font-size:11px; color:var(--text3); text-transform:uppercase; letter-spacing:0.5px; font-weight: 600; }

.grid { display:grid; grid-template-columns:320px 1fr; gap:24px; margin-bottom:24px; align-items: start; }

.sidebar-col { display: flex; flex-direction: column; gap: 16px; }

.card { background:var(--bg2); border:1px solid var(--border); border-radius:var(--r); overflow:hidden; }
.card-hd { padding:16px 20px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:10px; background: rgba(79, 142, 247, 0.02); }
.card-hd-title { font-size:12px; font-weight:700; letter-spacing:1px; text-transform:uppercase; color:var(--text2); }
.card-bd { padding:16px 20px; }

.tabs { display:flex; gap:4px; margin-bottom:16px; border-bottom:1px solid var(--border); }
.tab { padding:10px 16px; font-size:12px; font-weight:600; color:var(--text3); cursor:pointer; border-bottom:2px solid transparent; transition:.2s; text-transform:uppercase; letter-spacing:0.5px; }
.tab:hover { color:var(--text2); }
.tab.active { color:var(--accent); border-bottom-color:var(--accent); }

.trend-item { display:flex; gap:12px; padding:12px; border-radius:10px; cursor:pointer; transition:.3s; position:relative; overflow:hidden; margin-bottom:6px; border: 1px solid transparent; }
.trend-item:hover { background:var(--bg3); transform:translateX(4px); }
.trend-item.hot { background:linear-gradient(135deg,rgba(247,79,79,.06),rgba(247,169,79,.03)); border-color: rgba(247,79,79,.15); }
.trend-item.hot:hover { border-color:var(--hot); }
.t-rank { font-family:'Playfair Display',serif; font-size:24px; font-weight:900; min-width:32px; line-height:1; margin-top:2px; text-align: center; background:linear-gradient(135deg,var(--text3),var(--border)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
.t-rank.r1 { background:linear-gradient(135deg,#f74f4f,#f7a94f); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; filter:drop-shadow(0 0 6px rgba(247,79,79,.3)); }
.t-rank.r2 { background:linear-gradient(135deg,#f7a94f,#f7d94f); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
.t-rank.r3 { background:linear-gradient(135deg,#4f8ef7,#4ff7a0); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
.t-content { flex:1; min-width:0; }
.t-header { display:flex; align-items:center; gap:8px; margin-bottom:4px; flex-wrap:wrap; }
.t-topic { font-size:14px; font-weight:600; }
.t-badge { font-size:9px; font-weight:700; padding:2px 6px; border-radius:10px; text-transform:uppercase; letter-spacing:0.5px; }
.t-badge.hot { background:var(--hot); color:#fff; animation:pulseGlow 2s infinite; }
.t-badge.rising { background:rgba(79,247,160,.15); color:var(--accent3); }
.t-reason { font-size:12px; color:var(--text3); margin-top:4px; line-height:1.5; }
.t-bar { height:4px; background:var(--border); border-radius:4px; margin-top:8px; overflow:hidden; }
.t-bar-fill { height:100%; border-radius:4px; background:linear-gradient(90deg,var(--accent),var(--accent2)); animation:progressFill 1s ease-out both; }
.trend-item.hot .t-bar-fill { background:linear-gradient(90deg,var(--hot),var(--accent2)); }
.t-score { font-size:11px; font-weight:700; color:var(--text3); margin-left:auto; flex-shrink:0; background: var(--bg3); padding: 2px 6px; border-radius: 4px; }

.share-box { display:flex; gap:8px; align-items:center; background:var(--bg3); border:1px solid var(--border); border-radius:8px; padding:10px 12px; }
.share-input { flex:1; background:none; border:none; color:var(--text2); font-size:12px; font-family:monospace; outline:none; }
.btn-copy { background:var(--bg2); border:1px solid var(--border); color:var(--text2); padding:6px 12px; border-radius:6px; font-size:11px; cursor:pointer; font-family:inherit; white-space:nowrap; transition:.2s; }
.btn-copy:hover { border-color:var(--accent); color:var(--accent); }
.btn-copy.ok { background:var(--accent3); color:#000; border-color:var(--accent3); }

.cluster-col { position: relative; }
.cluster-wrapper {
  max-height: var(--sidebar-h);
  overflow: hidden;
  position: relative;
  transition: max-height 0.6s cubic-bezier(0.4, 0, 0.2, 1);
}
.cluster-wrapper.expanded {
  max-height: 5000px;
}
.cluster-wrapper::after {
  content: "";
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  height: 100px;
  background: linear-gradient(to bottom, transparent, var(--bg));
  pointer-events: none;
  transition: opacity 0.3s;
  z-index: 10;
}
.cluster-wrapper.expanded::after {
  opacity: 0;
}

.view-more-btn {
  display: block;
  width: 100%;
  margin-top: 12px;
  padding: 14px 20px;
  background: linear-gradient(135deg, var(--bg2), var(--bg3));
  border: 1px solid var(--border);
  border-radius: var(--r);
  color: var(--accent);
  font-family: inherit;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.3s;
  text-align: center;
  letter-spacing: 0.5px;
}
.view-more-btn:hover {
  border-color: var(--accent);
  background: linear-gradient(135deg, var(--bg3), rgba(79, 142, 247, 0.2));
  color: #fff;
  transform: translateY(-2px);
  box-shadow: 0 4px 12px rgba(79, 142, 247, 0.2);
}
.view-more-btn.hidden {
  display: none;
}

.filters { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:16px; }
.fbtn { background:var(--bg2); border:1px solid var(--border); color:var(--text2); padding:8px 16px; border-radius:20px; font-size:12px; font-family:inherit; cursor:pointer; transition:.2s; font-weight: 500; }
.fbtn:hover { border-color:var(--accent); color:var(--accent); transform: translateY(-2px); }
.fbtn.on { background:var(--accent); color:#fff; border-color:var(--accent); }
.fbtn.vn.on  { background:#4f8ef7; border-color:#4f8ef7; }
.fbtn.wo.on  { background:#a04ff7; border-color:#a04ff7; }
.fbtn.ec.on  { background:#f7a94f; border-color:#f7a94f; color:#000; }
.fbtn.mu.on  { background:#da291c; border-color:#da291c; }

.cl-card { background:var(--bg2); border:1px solid var(--border); border-radius:var(--r); overflow:hidden; margin-bottom:12px; transition:.3s; position:relative; }
.cl-card::before { content:""; position:absolute; top:0; left:0; bottom:0; width:4px; background:linear-gradient(180deg,var(--cool),var(--accent)); transition:.3s; }
.cl-card.imp-high::before { background:linear-gradient(180deg,var(--hot),var(--warm)); }
.cl-card.imp-med::before { background:linear-gradient(180deg,var(--warm),var(--accent2)); }
.cl-card.imp-low::before { background:linear-gradient(180deg,var(--cool),var(--accent)); }
.cl-card:hover { border-color:var(--accent); transform:translateY(-2px); box-shadow:0 8px 24px rgba(0,0,0,.3); }
.cl-hd { padding:16px 20px; display:flex; align-items:flex-start; gap:14px; cursor:pointer; position:relative; }
.cl-num { min-width:40px; height:40px; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:15px; font-weight:700; flex-shrink:0; margin-top:2px; position:relative; }
.cl-num.high { background:linear-gradient(135deg,var(--hot),var(--warm)); color:#fff; box-shadow:0 4px 12px rgba(247,79,79,.3); }
.cl-num.med { background:linear-gradient(135deg,var(--warm),#f7d94f); color:#000; }
.cl-num.low { background:var(--bg3); color:var(--accent); border:1px solid var(--border); }
.cl-num-icon { position:absolute; top:-4px; right:-4px; font-size:14px; filter:drop-shadow(0 2px 4px rgba(0,0,0,.5)); }
.cl-main { flex:1; min-width:0; }
.cl-title-row { display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
.cl-title { font-size:16px; font-weight:700; line-height:1.3; }
.cl-count { font-size:11px; font-weight:600; padding:3px 10px; border-radius:12px; background:var(--bg3); color:var(--text2); white-space:nowrap; }
.cl-sum { font-size:13px; color:var(--text2); margin-top:6px; line-height:1.6; }
.cl-preview { margin-top:12px; padding-top:12px; border-top:1px dashed var(--border); display:flex; flex-direction:column; gap:8px; }
.cl-preview-item { display:flex; align-items:center; gap:10px; font-size:13px; color:var(--text2); text-decoration:none; transition:.2s; }
.cl-preview-item:hover { color:var(--accent); }
.cl-preview-dot { width:5px; height:5px; border-radius:50%; background:var(--accent); flex-shrink:0; }
.cl-preview-title { flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.cl-preview-src { font-size:10px; color:var(--text3); flex-shrink:0; font-weight: 600; }
.cl-arrow { margin-left:auto; color:var(--text3); font-size:20px; flex-shrink:0; transition:.3s; margin-top: 4px; }
.cl-arrow.open { transform:rotate(180deg); color:var(--accent); }
.cl-body { border-top:1px solid var(--border); display:none; flex-direction:column; }
.cl-body.open { display:flex; animation:fadeInUp .3s ease-out; }
.art-row { padding:14px 20px; border-bottom:1px solid var(--border); transition:.2s; }
.art-row:hover { background:rgba(79,142,247,.03); }
.art-row:last-child { border-bottom:none; }
.art-title { font-size:14px; font-weight:500; color:var(--text); text-decoration:none; line-height:1.4; display:block; }
.art-title:hover { color:var(--accent); }
.art-meta { display:flex; gap:8px; align-items:center; font-size:11px; color:var(--text3); margin-top:4px; }
.art-summary { font-size:13px; color:var(--text2); line-height:1.6; margin-top:6px; }
.badge { display:inline-block; padding:2px 8px; border-radius:10px; font-size:10px; font-weight:700; text-transform:uppercase; }
.bvn  { background:rgba(79,142,247,.15); color:#4f8ef7; }
.bwo  { background:rgba(160,79,247,.15); color:#a04ff7; }
.bec  { background:rgba(247,169,79,.15); color:#f7a94f; }
.bmu  { background:rgba(218,41,28,.15); color:#da291c; }

.bottom-row { display:grid; grid-template-columns:1fr 1fr; gap:24px; }
.b-card { background:var(--bg2); border:1px solid var(--border); border-radius:var(--r); overflow:hidden; }
.b-hd { padding:16px 20px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:10px; background: rgba(79, 142, 247, 0.02); }
.b-title { font-size:12px; font-weight:700; letter-spacing:1px; text-transform:uppercase; color:var(--text2); }

.gt-grid { display:grid; grid-template-columns:1fr 1fr; padding:12px; gap:4px; }
.gt-row { display:flex; align-items:center; gap:10px; padding:10px 12px; border-radius:8px; text-decoration:none; transition:.2s; }
.gt-row:hover { background:var(--bg3); transform:translateX(2px); }
.gt-num { font-size:12px; font-weight:700; color:var(--text3); min-width:20px; text-align:right; flex-shrink:0; }
.gt-num.hot { color:var(--accent2); }
.gt-kw { font-size:13px; font-weight:500; color:var(--text); flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.gt-vol { font-size:10px; color:var(--accent3); background:rgba(79,247,160,.1); padding:2px 8px; border-radius:10px; white-space:nowrap; flex-shrink:0; font-weight: 600; }

.yt-grid { display:grid; grid-template-columns:1fr 1fr; padding:12px; gap:8px; }
.yt-row { display:flex; gap:10px; align-items:flex-start; padding:8px 10px; border-radius:8px; text-decoration:none; transition:.2s; }
.yt-row:hover { background:var(--bg3); }
.yt-num { font-size:11px; font-weight:700; color:var(--text3); min-width:18px; text-align:center; flex-shrink:0; margin-top:4px; }
.yt-num.hot { color:#f74f4f; }
.yt-thumb { width:80px; height:45px; object-fit:cover; border-radius:6px; flex-shrink:0; background:var(--bg3); }
.yt-info { flex:1; min-width:0; }
.yt-ttl { font-size:12px; font-weight:600; color:var(--text); line-height:1.4; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
.yt-ch { font-size:11px; color:var(--text3); margin-top:4px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.yt-views { color:var(--accent2); }

.empty { text-align:center; padding:40px 20px; color:var(--text3); }
.empty-ic { font-size:32px; margin-bottom:8px; opacity: 0.5; }
.empty-tx { font-size:13px; font-weight:600; color:var(--text2); }
.loading { display:flex; align-items:center; justify-content:center; padding:40px; min-height: 200px; }
.loading-dot { width:36px; height:36px; border-radius:50%; border:3px solid var(--border); border-top-color:var(--accent); animation:spin .8s linear infinite; }

.toast { position:fixed; bottom:24px; right:24px; z-index:9999; background:var(--bg3); border:1px solid var(--border); border-radius:10px; padding:14px 20px; font-size:13px; box-shadow:0 8px 32px rgba(0,0,0,.4); transform:translateY(60px); opacity:0; transition:.3s; }
.toast.show { transform:translateY(0); opacity:1; }
.toast.ok  { border-left:3px solid var(--accent3); }
.toast.err { border-left:3px solid var(--danger); }

#updatedAt { font-size:11px; color:var(--text3); text-align:right; margin:-16px 0 20px; font-weight: 500; }

@media(max-width:1200px) {
  .grid { grid-template-columns:1fr; }
  .cluster-wrapper { max-height: none !important; }
  .cluster-wrapper::after { display: none !important; }
  .view-more-btn { display: none !important; }
}
@media(max-width:900px) {
  .bottom-row { grid-template-columns:1fr; }
  .stats { grid-template-columns:repeat(2,1fr); }
  .gt-grid, .yt-grid { grid-template-columns:1fr; }
}
@media(max-width:600px) {
  .topbar { padding:0 16px; height: 56px; }
  .topbar-meta { display:none; }
  .wrap { padding:16px; }
  .digest-h { font-size:20px; }
  .cl-title { font-size:15px; }
  .stats { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">Tin<span>247</span></div>
  <div class="topbar-meta">Tổng hợp tin tức · AI phân tích</div>
  <div class="date-nav">
    <button class="nav-btn" id="btnPrev">‹</button>
    <input type="date" id="datePicker">
    <button class="nav-btn" id="btnNext">›</button>
  </div>
  <button class="btn-refresh" id="btnRefresh" onclick="loadDate(currentDate)">
    <span id="refreshIc">↻</span> Làm mới
  </button>
</div>

<div class="wrap">
  <div id="updatedAt"></div>

  <div id="digestWrap" style="display:none" class="digest fade-in">
    <div class="digest-label">📋 Tổng kết hôm nay</div>
    <div class="digest-h" id="dHead"></div>
    <div class="digest-p" id="dOver"></div>
    <div class="digest-tags" id="dTags"></div>
    <div class="digest-groups" id="dGroups"></div>
  </div>

  <div class="stats">
    <div class="stat fade-in stagger-1"><div class="stat-ic">📰</div><div class="stat-n" id="sArt">—</div><div class="stat-l">Bài báo</div></div>
    <div class="stat fade-in stagger-2"><div class="stat-ic">🎯</div><div class="stat-n" id="sClu">—</div><div class="stat-l">Chủ đề</div></div>
    <div class="stat fade-in stagger-3"><div class="stat-ic">📡</div><div class="stat-n" id="sSrc">—</div><div class="stat-l">Nguồn tin</div></div>
    <div class="stat fade-in stagger-4"><div class="stat-ic">📈</div><div class="stat-n" id="sTrd">—</div><div class="stat-l">Xu hướng</div></div>
  </div>

  <div class="grid">
    <div class="sidebar-col" id="sidebarCol">
      <div class="card fade-in">
        <div class="card-hd"><span>🔥</span><span class="card-hd-title">Xu hướng hôm nay</span></div>
        <div class="card-bd">
          <div class="tabs">
            <div class="tab active" onclick="switchTab('trends',this)">📈 Xu hướng</div>
            <div class="tab" onclick="switchTab('financial',this)">💹 Thị trường</div>
          </div>
          <div id="trendsTab">
            <div id="trendBox"><div class="loading"><div class="loading-dot"></div></div></div>
          </div>
          <div id="financialTab" style="display:none">
            <div id="financialBox"><div class="loading"><div class="loading-dot"></div></div></div>
          </div>
        </div>
      </div>
      <div class="card fade-in stagger-2">
        <div class="card-hd"><span>🔗</span><span class="card-hd-title">Chia sẻ</span></div>
        <div class="card-bd">
          <div class="share-box">
            <input class="share-input" id="shareUrl" readonly>
            <button class="btn-copy" id="btnCopy" onclick="doShare()">Copy</button>
          </div>
        </div>
      </div>
    </div>

    <div class="cluster-col">
      <div class="filters">
        <button class="fbtn on" onclick="setF('all',this)">Tất cả</button>
        <button class="fbtn vn" onclick="setF('vn',this)">🇳 Việt Nam</button>
        <button class="fbtn wo" onclick="setF('world',this)">🌍 Quốc tế</button>
        <button class="fbtn ec" onclick="setF('economy',this)">💹 Kinh tế</button>
        <button class="fbtn mu" onclick="setF('mu',this)"> MU</button>
      </div>
      <div class="cluster-wrapper" id="clusterWrapper">
        <div id="clusterBox"><div class="loading"><div class="loading-dot"></div></div></div>
      </div>
      <button class="view-more-btn" id="viewMoreBtn" onclick="toggleViewMore()">⬇ Xem thêm tất cả chủ đề</button>
    </div>
  </div>

  <div class="bottom-row">
    <div class="b-card fade-in">
      <div class="b-hd"><span></span><span class="b-title">Google Trends Việt Nam</span></div>
      <div id="gtBox"><div class="loading"><div class="loading-dot"></div></div></div>
    </div>
    <div class="b-card fade-in stagger-2">
      <div class="b-hd"><span>▶️</span><span class="b-title">YouTube Trending Việt Nam</span></div>
      <div id="ytBox"><div class="loading"><div class="loading-dot"></div></div></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp, getApps, getApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, get, child } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const cfg = {
  apiKey:"AIzaSyAp8BhBUkJLwONnp3Eb8AEf8OVRMRQaPmg",
  authDomain:"tonghoptinngay.firebaseapp.com",
  projectId:"tonghoptinngay",
  storageBucket:"tonghoptinngay.firebasestorage.app",
  messagingSenderId:"25835895512",
  appId:"1:25835895512:web:ac50fdd6d8ad10fc4335ad",
  databaseURL:"https://tonghoptinngay-default-rtdb.asia-southeast1.firebasedatabase.app"
};
const app = getApps().length ? getApp() : initializeApp(cfg);
const DB  = getDatabase(app);
const R   = ref(DB);

let currentDate = vnToday();
let arts = {}, clusters = [], filter = "all";
let financialData = null;
window.currentDate = currentDate;

function vnToday() { return new Date(Date.now()+7*3600000).toISOString().slice(0,10); }
function shiftDate(d, n) { const dt = new Date(d+"T00:00:00Z"); dt.setUTCDate(dt.getUTCDate()+n); return dt.toISOString().slice(0,10); }
function esc(s) { return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
function toArr(v) { return Array.isArray(v)?v:Object.values(v||{}); }
function fmt(n) { n=parseInt(n)||0; return n>=1e6?(n/1e6).toFixed(1)+"M":n>=1e3?(n/1e3).toFixed(0)+"K":String(n); }
function emptyBox(ic,tx) { return `<div class="empty"><div class="empty-ic">${ic}</div><div class="empty-tx">${tx}</div></div>`; }
function catBadge(c) { const m={vn:["bvn","VN"],world:["bwo","Quốc tế"],economy:["bec","Kinh tế"],mu:["bmu","MU"]}; const [cls,lb]=m[c]||["bvn",c]; return `<span class="badge ${cls}">${lb}</span>`; }
function impLevel(imp) { imp = parseInt(imp) || 0; if (imp >= 8) return "high"; if (imp >= 6) return "med"; return "low"; }
function impIcon(imp) { imp = parseInt(imp) || 0; if (imp >= 9) return "🔥"; if (imp >= 8) return "⭐"; if (imp >= 6) return "📌"; return "📰"; }

// 🔑 HÀM ĐO CHIỀU CAO THỰC CỦA SIDEBAR
function syncSidebarHeight() {
  const sidebar = document.getElementById("sidebarCol");
  const wrapper = document.getElementById("clusterWrapper");
  if (!sidebar || !wrapper) return;
  
  const sidebarH = sidebar.offsetHeight;
  // Chỉ sync khi sidebar có nội dung (không phải 0)
  if (sidebarH > 100) {
    // Set CSS variable = chiều cao thực + 16px (padding gap)
    document.documentElement.style.setProperty('--sidebar-h', (sidebarH + 16) + 'px');
  }
}

// 🔑 HÀM KIỂM TRA NÚT XEM THÊM
function checkViewMore() {
  const wrapper = document.getElementById("clusterWrapper");
  const btn = document.getElementById("viewMoreBtn");
  if (!wrapper || !btn) return;
  
  const sidebarH = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--sidebar-h')) || 700;
  const contentH = wrapper.scrollHeight;
  
  if (contentH > sidebarH + 30) {
    btn.classList.remove("hidden");
    btn.textContent = "⬇ Xem thêm tất cả chủ đề";
  } else {
    btn.classList.add("hidden");
  }
}

// 🔑 TOGGLE XEM THÊM / THU GỌN
window.toggleViewMore = function() {
  const wrapper = document.getElementById("clusterWrapper");
  const btn = document.getElementById("viewMoreBtn");
  if (!wrapper || !btn) return;
  
  if (wrapper.classList.contains("expanded")) {
    wrapper.classList.remove("expanded");
    btn.textContent = "⬇ Xem thêm tất cả chủ đề";
    wrapper.scrollIntoView({ behavior: 'smooth', block: 'start' });
  } else {
    wrapper.classList.add("expanded");
    btn.textContent = "⬆ Thu gọn";
  }
};

window.addEventListener("DOMContentLoaded",()=>{
  const dp=document.getElementById("datePicker");
  dp.value=currentDate; dp.max=currentDate;
  dp.onchange=()=>{ currentDate=dp.value; window.currentDate=currentDate; loadDate(currentDate); };
  document.getElementById("btnPrev").onclick=()=>{ currentDate=shiftDate(currentDate,-1); dp.value=currentDate; loadDate(currentDate); };
  document.getElementById("btnNext").onclick=()=>{ if(currentDate>=vnToday())return; currentDate=shiftDate(currentDate,1); dp.value=currentDate; loadDate(currentDate); };
  document.getElementById("shareUrl").value=location.href;
  const p=new URLSearchParams(location.search);
  if(p.get("date")){currentDate=p.get("date");dp.value=currentDate;}
  loadDate(currentDate);
  
  // 🔑 Lắng nghe resize window để đo lại chiều cao
  window.addEventListener('resize', () => {
    setTimeout(syncSidebarHeight, 100);
    setTimeout(checkViewMore, 150);
  });
});

window.loadDate=async function(date){
  setBusy(true);
  try{
    const [aS,cS,tS,dS,gS,yS,fS]=await Promise.all([
      get(child(R,`articles/${date}`)), get(child(R,`clusters/${date}`)), get(child(R,`trends/${date}`)),
      get(child(R,`digest/${date}`)), get(child(R,`google_trends/${date}`)), get(child(R,`youtube_trends/${date}`)), get(child(R,`financial/${date}`)),
    ]);
    arts = aS.exists()?aS.val():{}; clusters = cS.exists()?toArr(cS.val()):[];
    const trends=tS.exists()?toArr(tS.val()):[]; const digest=dS.exists()?dS.val():null;
    const gTrends=gS.exists()?toArr(gS.val()):[]; const yTrends=yS.exists()?toArr(yS.val()):[];
    financialData=fS.exists()?fS.val():null;

    renderDigest(digest); renderStats(arts,clusters,trends); renderTrends(trends);
    renderFinancial(financialData); renderClusters(arts,clusters,filter);
    renderGoogle(gTrends); renderYoutube(yTrends);
    document.getElementById("btnNext").disabled=date>=vnToday();
    if(digest?.updatedAt){
      const dt=new Date(digest.updatedAt);
      document.getElementById("updatedAt").textContent=`Cập nhật lúc ${dt.toLocaleTimeString("vi-VN",{hour:"2-digit",minute:"2-digit"})} ngày ${dt.toLocaleDateString("vi-VN")}`;
    }
    // 🔑 Đo chiều cao sidebar sau khi render xong
    setTimeout(syncSidebarHeight, 100);
    setTimeout(checkViewMore, 200);
  }catch(e){toast("Lỗi: "+e.message,"err");}
  finally{setBusy(false);}
};

function renderDigest(d){
  const w=document.getElementById("digestWrap");
  if(!d?.headline){w.style.display="none";return;}
  w.style.display="block";
  document.getElementById("dHead").textContent=d.headline;
  document.getElementById("dOver").textContent=d.overview||"";
  document.getElementById("dTags").innerHTML=(d.key_points||[]).map(p=>`<span class="digest-tag">${esc(p)}</span>`).join("");
  document.getElementById("dGroups").innerHTML=(d.topic_groups||[]).map(g=>`<div class="dg-item"><div class="dg-name">${esc(g.group_name)}</div><div class="dg-text">${esc(g.summary)}</div></div>`).join("");
}

function renderStats(a,c,t){
  const arr=Object.values(a);
  animateNumber("sArt", arr.length||0); animateNumber("sClu", c.length||0);
  animateNumber("sSrc", new Set(arr.map(x=>x.source)).size||0); animateNumber("sTrd", t.length||0);
}

function animateNumber(id, target) {
  const el = document.getElementById(id); const duration = 800; const start = performance.now();
  function update(now) {
    const elapsed = now - start; const progress = Math.min(elapsed / duration, 1);
    const eased = 1 - Math.pow(1 - progress, 3);
    el.textContent = Math.round(target * eased);
    if (progress < 1) requestAnimationFrame(update);
  }
  requestAnimationFrame(update);
}

function renderTrends(t){
  const el=document.getElementById("trendBox");
  if(!t.length){el.innerHTML=emptyBox("","Chưa có dữ liệu");return;}
  const rc=r=>r===1?"r1":r===2?"r2":r===3?"r3":"";
  el.innerHTML=t.map((x,i)=>{
    const isHot = x.rank === 1 || (x.score||0) >= 90;
    const isRising = (x.score||0) >= 80 && x.rank > 1;
    return `<div class="trend-item ${isHot?'hot':''}" style="animation:slideInRight .4s ease-out ${i*0.08}s both">
      <div class="t-rank ${rc(x.rank)}">${x.rank}</div>
      <div class="t-content">
        <div class="t-header"><div class="t-topic">${esc(x.topic)}</div>${isHot?'<span class="t-badge hot">🔥 HOT</span>':''}${isRising?'<span class="t-badge rising">↑ Rising</span>':''}</div>
        <div class="t-reason">${esc(x.reason||"")}</div>
        <div class="t-bar"><div class="t-bar-fill" style="width:${x.score||50}%;animation-delay:${i*0.1+0.3}s"></div></div>
      </div>
      <div class="t-score">${x.score||0}</div>
    </div>`;
  }).join("");
  
  // 🔑 Sau khi render trends → đo lại chiều cao sidebar
  setTimeout(syncSidebarHeight, 50);
  setTimeout(checkViewMore, 100);
}

function renderFinancial(data){
  const el=document.getElementById("financialBox");
  if(!data){el.innerHTML=emptyBox("💹","Chưa có dữ liệu thị trường");return;}
  let html='<div class="fin-grid">';
  if(data.gold) html+=renderFinCard("🥇","Vàng SJC",data.gold,"nghìn/chỉ",data.gold.priceUsd?`${data.gold.priceUsd.toLocaleString()} USD/oz`:"");
  if(data.bitcoin) html+=renderFinCard("₿","Bitcoin",data.bitcoin,"VND",data.bitcoin.priceUsd?`$${data.bitcoin.priceUsd.toLocaleString()}`:"");
  if(data.usd) html+=renderFinCard("💵","USD/VND",data.usd,"VND","Tỷ giá");
  if(data.jpy) html+=renderFinCard("💴","Yên Nhật",data.jpy,"VND","Tỷ giá");
  html+='</div>';
  if(data.stocks) html+=renderStockMovers(data.stocks);
  if(data.updatedAt){ const dt=new Date(data.updatedAt); html+=`<div style="margin-top:12px;font-size:10px;color:var(--text3);text-align:right;font-weight:500">Cập nhật: ${dt.toLocaleTimeString("vi-VN",{hour:"2-digit",minute:"2-digit"})}</div>`; }
  el.innerHTML=html;
  
  // 🔑 Sau khi render financial → đo lại chiều cao sidebar
  setTimeout(syncSidebarHeight, 50);
  setTimeout(checkViewMore, 100);
}

function renderFinCard(icon,name,data,unit,sub){
  const isUp=data.change>=0; const cls=isUp?"up":"down"; const arrow=isUp?"↑":"↓";
  const price=formatFinNumber(data.price); const change=data.change.toFixed(2);
  return `<div class="fin-card ${cls}">
    <div class="fin-header"><div class="fin-icon">${icon}</div><div class="fin-name">${name}</div></div>
    <div class="fin-price">${price}</div>${sub?`<div class="fin-sub">${esc(sub)}</div>`:''}
    <div class="fin-change ${cls}">${arrow} ${Math.abs(change)}%</div>
    <div class="fin-sparkline">${renderSparkline(data.history)}</div>
  </div>`;
}

function formatFinNumber(n){ if(n>=1e9) return (n/1e9).toFixed(2)+"B"; if(n>=1e6) return (n/1e6).toFixed(1)+"M"; if(n>=1e3) return n.toLocaleString("vi-VN"); if(Number.isInteger(n)) return n.toString(); return n.toFixed(2); }

function renderSparkline(history){
  if(!history||history.length<2) return "";
  const min=Math.min(...history); const max=Math.max(...history); const range=max-min||1;
  const w=200; const h=40; const padding=2; const step=(w-padding*2)/(history.length-1);
  const points=history.map((v,i)=>{ const x=padding+i*step; const y=h-padding-((v-min)/range*(h-padding*2)); return `${x.toFixed(1)},${y.toFixed(1)}`; }).join(" ");
  return `<svg viewBox="0 0 ${w} ${h}" preserveAspectRatio="none"><polyline points="${points}"/></svg>`;
}

function renderStockMovers(stocks){
  let html='<div class="movers-section"><div class="movers-title"> Stocks biến động 3 phiên</div><div class="movers-grid">';
  html+='<div><div class="movers-col-title gainers"> Tăng 3 phiên</div>';
  if(stocks.gainers&&stocks.gainers.length){ stocks.gainers.forEach(s=>{ html+=`<div class="stock-item up"><div class="stock-header"><div><span class="stock-symbol">${s.symbol}</span><span class="stock-price">${formatFinNumber(s.price)}</span></div><div class="stock-change up">↑${s.change}%</div></div><div class="stock-sparkline">${renderSparkline(s.history)}</div></div>`; }); }
  else { html+='<div class="stock-empty">Không có mã tăng 3 phiên</div>'; }
  html+='</div><div><div class="movers-col-title losers"> Giảm 3 phiên</div>';
  if(stocks.losers&&stocks.losers.length){ stocks.losers.forEach(s=>{ html+=`<div class="stock-item down"><div class="stock-header"><div><span class="stock-symbol">${s.symbol}</span><span class="stock-price">${formatFinNumber(s.price)}</span></div><div class="stock-change down">↓${Math.abs(s.change)}%</div></div><div class="stock-sparkline">${renderSparkline(s.history)}</div></div>`; }); }
  else { html+='<div class="stock-empty">Không có mã giảm 3 phiên</div>'; }
  html+='</div></div></div>'; return html;
}

function renderClusters(a,cls,f){
  const arr=Object.values(a); const byId={}; arr.forEach(x=>{ byId[x.id]=x; });
  const el=document.getElementById("clusterBox"); let list=cls;
  if(f!=="all"){ list=cls.filter(c=>{ const ids=Array.isArray(c.articles)?c.articles:[]; return ids.map(id=>byId[id]).filter(Boolean).some(x=>x.cat===f); }); }
  if(!list.length){el.innerHTML=emptyBox("🗞️","Không có tin trong mục này");return;}
  const sorted=[...list].sort((a,b)=>(b.importance||0)-(a.importance||0));
  el.innerHTML=sorted.map((c,ci)=>{
    const ids=Array.isArray(c.articles)?c.articles:[]; const rel=ids.map(id=>byId[id]).filter(Boolean);
    const imp = parseInt(c.importance) || 0; const level = impLevel(imp); const icon = impIcon(imp);
    const previewItems = rel.slice(0, 2).map(a => `<a class="cl-preview-item" href="${esc(a.url)}" target="_blank" rel="noopener"><span class="cl-preview-dot"></span><span class="cl-preview-title">${esc(a.title_vi||a.title)}</span><span class="cl-preview-src">${esc(a.source)}</span></a>`).join("");
    const rows=rel.map(a=>`<div class="art-row"><a class="art-title" href="${esc(a.url)}" target="_blank" rel="noopener">${esc(a.title_vi||a.title)}</a>${(a.summary_vi||a.summary)?`<div class="art-summary">${esc(a.summary_vi||a.summary)}</div>`:""}<div class="art-meta">${catBadge(a.cat)}<span>${esc(a.source)}</span></div></div>`).join("");
    return `<div class="cl-card imp-${level} fade-in" style="animation-delay:${ci*0.05}s">
      <div class="cl-hd" onclick="toggleCl(${ci})">
        <div class="cl-num ${level}">${imp}<span class="cl-num-icon">${icon}</span></div>
        <div class="cl-main">
          <div class="cl-title-row"><div class="cl-title">${esc(c.topic)}</div><span class="cl-count"> ${rel.length} bài</span></div>
          <div class="cl-sum">${esc(c.summary||"")}</div>
          ${previewItems && rel.length > 2 ? `<div class="cl-preview">${previewItems}</div>` : ''}
        </div>
        <div class="cl-arrow" id="ca${ci}">⌄</div>
      </div>
      <div class="cl-body" id="cb${ci}">${rows||emptyBox("","Không có bài")}</div>
    </div>`;
  }).join("");
  
  setTimeout(checkViewMore, 150);
}

function renderGoogle(items){
  const el=document.getElementById("gtBox");
  if(!items.length){el.innerHTML=emptyBox("🔍","Chưa có dữ liệu");return;}
  el.innerHTML=`<div class="gt-grid">${items.slice(0,10).map((t,i)=>{ const kw=t.keyword||t.query||""; const vol=t.traffic||""; const url=(t.news_items||[])[0]?.url||"#"; return `<a class="gt-row" href="${esc(url)}" target="_blank" rel="noopener" style="animation:fadeInUp .4s ease-out ${i*0.05}s both"><span class="gt-num ${i<3?"hot":""}">${i+1}</span><span class="gt-kw">${esc(kw)}</span>${vol?`<span class="gt-vol">${esc(vol)}</span>`:""}</a>`; }).join("")}</div>`;
}

function renderYoutube(items){
  const el=document.getElementById("ytBox");
  if(!items.length){el.innerHTML=emptyBox("▶️","Chưa có dữ liệu");return;}
  el.innerHTML=`<div class="yt-grid">${items.slice(0,10).map((v,i)=>{ const vid=v.videoId||""; const url=v.url||(vid?`https://www.youtube.com/watch?v=${vid}`:"#"); const th=v.thumbnail||(vid?`https://i.ytimg.com/vi/${vid}/mqdefault.jpg`:""); return `<a class="yt-row" href="${esc(url)}" target="_blank" rel="noopener" style="animation:fadeInUp .4s ease-out ${i*0.05}s both"><span class="yt-num ${i<3?"hot":""}">${i+1}</span>${th?`<img class="yt-thumb" src="${esc(th)}" alt="" loading="lazy" onerror="this.style.display='none'">`:""}<div class="yt-info"><div class="yt-ttl">${esc(v.title||"")}</div><div class="yt-ch">${esc(v.channel||"")}${v.viewCount?` · <span class="yt-views">${fmt(v.viewCount)}</span>`:""}</div></div></a>`; }).join("")}</div>`;
}

window.setF=function(f,btn){ filter=f; document.querySelectorAll(".fbtn").forEach(b=>b.classList.remove("on")); btn.classList.add("on"); renderClusters(arts,clusters,f); };
window.toggleCl=function(i){ const b=document.getElementById("cb"+i), a=document.getElementById("ca"+i); a.classList.toggle("open",b.classList.toggle("open")); };
window.doShare=function(){ const url=`${location.origin}${location.pathname}?date=${currentDate}`; document.getElementById("shareUrl").value=url; navigator.clipboard.writeText(url).then(()=>{ const b=document.getElementById("btnCopy"); b.textContent="✓ Đã copy"; b.classList.add("ok"); setTimeout(()=>{b.textContent="Copy";b.classList.remove("ok");},2000); }); };

// 🔑 ĐO LẠI CHIỀU CAO KHI ĐỔI TAB
window.switchTab=function(tab,btn){ 
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active")); 
  btn.classList.add("active"); 
  document.getElementById("trendsTab").style.display=tab==="trends"?"block":"none"; 
  document.getElementById("financialTab").style.display=tab==="financial"?"block":"none";
  // Đo lại chiều cao sidebar sau khi đổi tab
  setTimeout(syncSidebarHeight, 50);
  setTimeout(checkViewMore, 100);
};

function setBusy(on){ document.getElementById("btnRefresh").classList.toggle("loading",on); const ic=document.getElementById("refreshIc"); ic.classList.toggle("spin",on); }
function toast(msg,type="ok"){ const t=document.getElementById("toast"); t.textContent=msg; t.className=`toast ${type} show`; setTimeout(()=>t.classList.remove("show"),3000); }
window.showToast=toast;
</script>
</body>
