<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Tổng Hợp Tin Ngày</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        #0d0f14;
    --bg2:       #13161e;
    --bg3:       #1a1e2a;
    --border:    #252a38;
    --accent:    #4f8ef7;
    --accent2:   #f7a94f;
    --accent3:   #4ff7a0;
    --text:      #e8eaf0;
    --text2:     #8b90a0;
    --text3:     #555b6e;
    --cat-vn:    #4f8ef7;
    --cat-world: #a04ff7;
    --cat-eco:   #f7a94f;
    --danger:    #f74f4f;
    --radius:    10px;
    --transition: 0.2s ease;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Be Vietnam Pro', sans-serif;
    font-size: 14px;
    line-height: 1.6;
    min-height: 100vh;
  }

  .topbar {
    position: sticky; top: 0; z-index: 100;
    background: rgba(13,15,20,0.92);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 0 20px;
    display: flex; align-items: center; gap: 16px;
    height: 56px;
  }
  .logo {
    font-family: 'Playfair Display', serif;
    font-size: 18px; font-weight: 900;
    color: var(--text);
    letter-spacing: -0.5px;
    white-space: nowrap;
  }
  .logo span { color: var(--accent); }
  .topbar-meta {
    flex: 1;
    font-size: 12px; color: var(--text3);
  }
  .date-nav {
    display: flex; align-items: center; gap: 6px;
  }
  .date-nav button {
    background: var(--bg3); border: 1px solid var(--border);
    color: var(--text2); cursor: pointer;
    width: 28px; height: 28px; border-radius: 6px;
    font-size: 14px; display: flex; align-items: center; justify-content: center;
    transition: var(--transition);
  }
  .date-nav button:hover { background: var(--accent); color: #fff; border-color: var(--accent); }
  .date-nav button:disabled { opacity: 0.3; cursor: not-allowed; }
  #datePicker {
    background: var(--bg3); border: 1px solid var(--border);
    color: var(--text); padding: 4px 10px; border-radius: 6px;
    font-size: 12px; cursor: pointer;
    font-family: inherit;
  }
  .btn-refresh {
    background: var(--accent); color: #fff; border: none;
    padding: 6px 14px; border-radius: 6px; cursor: pointer;
    font-size: 12px; font-family: inherit; font-weight: 600;
    display: flex; align-items: center; gap: 6px;
    transition: var(--transition);
  }
  .btn-refresh:hover { opacity: 0.85; }
  .btn-refresh.loading { opacity: 0.6; pointer-events: none; }
  .spinner { animation: spin 0.8s linear infinite; display: inline-block; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .container { max-width: 1280px; margin: 0 auto; padding: 20px; }

  .digest-banner {
    background: linear-gradient(135deg, var(--bg2) 0%, #1a1e35 100%);
    border: 1px solid var(--border);
    border-left: 3px solid var(--accent);
    border-radius: var(--radius);
    padding: 20px 24px;
    margin-bottom: 20px;
  }
  .digest-label {
    font-size: 10px; font-weight: 700; letter-spacing: 2px;
    color: var(--accent); text-transform: uppercase; margin-bottom: 8px;
  }
  .digest-headline {
    font-family: 'Playfair Display', serif;
    font-size: 22px; font-weight: 700;
    color: var(--text); line-height: 1.3;
    margin-bottom: 10px;
  }
  .digest-overview {
    color: var(--text2); font-size: 13px; line-height: 1.7;
    margin-bottom: 14px;
  }
  .digest-points {
    display: flex; flex-wrap: wrap; gap: 8px;
  }
  .digest-point {
    background: var(--bg3); border: 1px solid var(--border);
    border-radius: 20px; padding: 4px 12px;
    font-size: 12px; color: var(--text2);
    display: flex; align-items: center; gap: 6px;
  }
  .digest-point::before { content: "•"; color: var(--accent); font-size: 16px; }

  .main-grid {
    display: grid;
    grid-template-columns: 260px 1fr;
    gap: 16px;
    align-items: start;
  }

  .sidebar { display: flex; flex-direction: column; gap: 16px; }
  .card {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: var(--radius); overflow: hidden;
  }
  .card-header {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 8px;
  }
  .card-title {
    font-size: 11px; font-weight: 700; letter-spacing: 1.5px;
    text-transform: uppercase; color: var(--text2);
  }
  .card-body { padding: 12px; }

  .trend-item {
    display: flex; align-items: flex-start; gap: 10px;
    padding: 8px; border-radius: 8px; cursor: pointer;
    transition: var(--transition);
  }
  .trend-item:hover { background: var(--bg3); }
  .trend-rank {
    font-family: 'Playfair Display', serif;
    font-size: 20px; font-weight: 900;
    color: var(--border); min-width: 28px; line-height: 1;
    margin-top: 2px;
  }
  .trend-rank.top1 { color: var(--accent2); }
  .trend-rank.top2 { color: var(--text3); }
  .trend-rank.top3 { color: #7c5c3a; }
  .trend-info { flex: 1; }
  .trend-topic { font-size: 13px; font-weight: 600; color: var(--text); }
  .trend-reason { font-size: 11px; color: var(--text3); margin-top: 2px; line-height: 1.4; }
  .trend-bar {
    height: 2px; background: var(--border); border-radius: 2px;
    margin-top: 6px;
  }
  .trend-bar-fill { height: 100%; border-radius: 2px; background: var(--accent); }

  .content-area { display: flex; flex-direction: column; gap: 16px; }

  .filter-bar {
    display: flex; gap: 6px; flex-wrap: wrap;
  }
  .filter-btn {
    background: var(--bg2); border: 1px solid var(--border);
    color: var(--text2); padding: 5px 14px; border-radius: 20px;
    font-size: 12px; font-family: inherit; cursor: pointer;
    transition: var(--transition);
  }
  .filter-btn:hover, .filter-btn.active {
    background: var(--accent); color: #fff; border-color: var(--accent);
  }
  .filter-btn.cat-world.active { background: var(--cat-world); border-color: var(--cat-world); }
  .filter-btn.cat-eco.active   { background: var(--cat-eco);   border-color: var(--cat-eco);   color: #000; }
  .filter-btn.cat-vn.active    { background: var(--cat-vn);    border-color: var(--cat-vn); }

  .cluster-card {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: var(--radius); overflow: hidden;
    transition: var(--transition);
  }
  .cluster-card:hover { border-color: var(--accent); }
  .cluster-header {
    padding: 14px 16px;
    display: flex; align-items: flex-start; gap: 10px;
    cursor: pointer;
  }
  .cluster-importance {
    min-width: 28px; height: 28px;
    background: var(--bg3); border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 700; color: var(--accent2);
    flex-shrink: 0; margin-top: 2px;
  }
  .cluster-title {
    font-size: 15px; font-weight: 700; color: var(--text);
    line-height: 1.3;
  }
  .cluster-summary {
    font-size: 12px; color: var(--text2); margin-top: 4px;
    line-height: 1.6;
  }
  .cluster-toggle {
    margin-left: auto; color: var(--text3); font-size: 18px;
    flex-shrink: 0; transition: var(--transition);
  }
  .cluster-toggle.open { transform: rotate(180deg); }
  .cluster-articles {
    border-top: 1px solid var(--border);
    display: none; flex-direction: column;
  }
  .cluster-articles.open { display: flex; }
  .article-item {
    padding: 10px 16px 10px 54px;
    border-bottom: 1px solid var(--border);
    display: flex; flex-direction: column; gap: 3px;
  }
  .article-item:last-child { border-bottom: none; }
  .article-title {
    font-size: 13px; font-weight: 500; color: var(--text);
    text-decoration: none; line-height: 1.4;
    transition: var(--transition);
  }
  .article-title:hover { color: var(--accent); }
  .article-meta {
    display: flex; gap: 10px; align-items: center;
    font-size: 11px; color: var(--text3);
  }
  .cat-badge {
    display: inline-block; padding: 1px 7px; border-radius: 10px;
    font-size: 10px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .cat-vn    { background: rgba(79,142,247,0.15); color: var(--cat-vn); }
  .cat-world { background: rgba(160,79,247,0.15); color: var(--cat-world); }
  .cat-economy { background: rgba(247,169,79,0.15); color: var(--cat-eco); }

  .stats-row {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px;
    margin-bottom: 4px;
  }
  .stat-card {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 14px;
    text-align: center;
  }
  .stat-num {
    font-family: 'Playfair Display', serif;
    font-size: 28px; font-weight: 700; color: var(--accent);
    line-height: 1;
  }
  .stat-label { font-size: 11px; color: var(--text3); margin-top: 4px; }

  .share-box {
    display: flex; gap: 8px; align-items: center;
    background: var(--bg3); border: 1px solid var(--border);
    border-radius: 8px; padding: 8px 12px;
  }
  .share-url {
    flex: 1; background: none; border: none; color: var(--text2);
    font-size: 12px; font-family: 'Be Vietnam Pro', monospace;
    outline: none; cursor: pointer;
  }
  .btn-copy {
    background: var(--bg3); border: 1px solid var(--border);
    color: var(--text2); padding: 4px 10px; border-radius: 6px;
    font-size: 11px; cursor: pointer; transition: var(--transition);
    font-family: inherit; white-space: nowrap;
  }
  .btn-copy:hover { border-color: var(--accent); color: var(--accent); }
  .btn-copy.copied { background: var(--accent3); color: #000; border-color: var(--accent3); }

  .loading-state {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; padding: 60px 20px; gap: 12px;
    color: var(--text3);
  }
  .loading-dot {
    width: 40px; height: 40px; border-radius: 50%;
    border: 3px solid var(--border); border-top-color: var(--accent);
    animation: spin 0.8s linear infinite;
  }
  .empty-state {
    text-align: center; padding: 60px 20px; color: var(--text3);
  }
  .empty-icon { font-size: 40px; margin-bottom: 12px; }
  .empty-title { font-size: 16px; font-weight: 600; color: var(--text2); margin-bottom: 6px; }

  .toast {
    position: fixed; bottom: 24px; right: 24px; z-index: 9999;
    background: var(--bg3); border: 1px solid var(--border);
    border-radius: 10px; padding: 12px 18px;
    font-size: 13px; color: var(--text);
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    transform: translateY(60px); opacity: 0;
    transition: all 0.3s ease;
  }
  .toast.show { transform: translateY(0); opacity: 1; }
  .toast.success { border-left: 3px solid var(--accent3); }
  .toast.error   { border-left: 3px solid var(--danger); }

  @media (max-width: 768px) {
    .main-grid { grid-template-columns: 1fr; }
    .stats-row { grid-template-columns: repeat(2, 1fr); }
    .topbar { padding: 0 12px; gap: 8px; }
    .logo { font-size: 15px; }
    .topbar-meta { display: none; }
    .container { padding: 12px; }
  }

  #updatedAt {
    font-size: 11px; color: var(--text3);
    text-align: right; margin-top: -10px; margin-bottom: 14px;
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">Tin<span>247</span></div>
  <div class="topbar-meta" id="topbarMeta">Tổng hợp tin tức · AI phân tích</div>
  <div class="date-nav">
    <button id="btnPrevDay" title="Ngày trước">‹</button>
    <input type="date" id="datePicker">
    <button id="btnNextDay" title="Ngày sau">›</button>
  </div>
  <button class="btn-refresh" id="btnRefresh" onclick="loadDate(currentDate)">
    <span id="refreshIcon">↻</span> Làm mới
  </button>
</div>

<div class="container">
  <div id="updatedAt"></div>

  <div id="digestBanner" class="digest-banner" style="display:none">
    <div class="digest-label">📋 Tổng kết hôm nay</div>
    <div class="digest-headline" id="digestHeadline"></div>
    <div class="digest-overview" id="digestOverview"></div>
    <div class="digest-points" id="digestPoints"></div>
  </div>

  <div class="stats-row" id="statsRow">
    <div class="stat-card"><div class="stat-num" id="statArticles">—</div><div class="stat-label">Bài báo</div></div>
    <div class="stat-card"><div class="stat-num" id="statClusters">—</div><div class="stat-label">Chủ đề</div></div>
    <div class="stat-card"><div class="stat-num" id="statSources">—</div><div class="stat-label">Nguồn tin</div></div>
    <div class="stat-card"><div class="stat-num" id="statTrends">—</div><div class="stat-label">Xu hướng</div></div>
  </div>

  <div class="main-grid">
    <div class="sidebar">
      <div class="card">
        <div class="card-header">
          <span>🔥</span>
          <span class="card-title">Xu hướng hôm nay</span>
        </div>
        <div class="card-body" id="trendsContainer">
          <div class="loading-state"><div class="loading-dot"></div></div>
        </div>
      </div>

      <div class="card">
        <div class="card-header">
          <span>🔗</span>
          <span class="card-title">Chia sẻ</span>
        </div>
        <div class="card-body">
          <div class="share-box">
            <input class="share-url" id="shareUrl" readonly>
            <button class="btn-copy" id="btnCopy" onclick="copyShareLink()">Copy</button>
          </div>
        </div>
      </div>
    </div>

    <div class="content-area">
      <div class="filter-bar">
        <button class="filter-btn active" onclick="setFilter('all', this)">Tất cả</button>
        <button class="filter-btn cat-vn"    onclick="setFilter('vn', this)">🇻🇳 Việt Nam</button>
        <button class="filter-btn cat-world" onclick="setFilter('world', this)">🌍 Quốc tế</button>
        <button class="filter-btn cat-eco"   onclick="setFilter('economy', this)">💹 Kinh tế</button>
      </div>

      <div id="clustersContainer">
        <div class="loading-state">
          <div class="loading-dot"></div>
          <span>Đang tải dữ liệu...</span>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp, getApps, getApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, get, child } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

console.log("✅ VERSION 3.0 - Code đã load thành công");

const cfg = {
  apiKey: "AIzaSyAp8BhBUkJLwONnp3Eb8AEf8OVRMRQaPmg",
  authDomain: "tonghoptinngay.firebaseapp.com",
  projectId: "tonghoptinngay",
  storageBucket: "tonghoptinngay.firebasestorage.app",
  messagingSenderId: "25835895512",
  appId: "1:25835895512:web:ac50fdd6d8ad10fc4335ad",
  databaseURL: "https://tonghoptinngay-default-rtdb.firebaseio.com"
};
const app = getApps().length ? getApp() : initializeApp(cfg);
const database = getDatabase(app);
const dbRef = ref(database);

let currentDate  = todayStr();
let allArticles  = {};
let allClusters  = [];
let currentFilter = "all";

window.currentDate = currentDate;

function todayStr() {
  const now = new Date();
  const vn = new Date(now.getTime() + 7*60*60*1000);
  return vn.toISOString().slice(0,10);
}

function offsetDate(str, days) {
  const d = new Date(str + "T00:00:00Z");
  d.setUTCDate(d.getUTCDate() + days);
  return d.toISOString().slice(0,10);
}

window.addEventListener("DOMContentLoaded", () => {
  const dp = document.getElementById("datePicker");
  dp.value = currentDate;
  dp.max   = currentDate;
  dp.addEventListener("change", () => { currentDate = dp.value; window.currentDate = currentDate; loadDate(currentDate); });

  document.getElementById("btnPrevDay").addEventListener("click", () => {
    currentDate = offsetDate(currentDate, -1);
    dp.value = currentDate; loadDate(currentDate);
  });
  document.getElementById("btnNextDay").addEventListener("click", () => {
    if (currentDate >= todayStr()) return;
    currentDate = offsetDate(currentDate, 1);
    dp.value = currentDate; loadDate(currentDate);
  });

  document.getElementById("shareUrl").value = window.location.href;

  const params = new URLSearchParams(location.search);
  if (params.get("date")) {
    currentDate = params.get("date");
    dp.value = currentDate;
  }

  loadDate(currentDate);
});

window.loadDate = async function(date) {
  setRefreshing(true);
  try {
    const [articlesSnap, clustersSnap, trendsSnap, digestSnap] = await Promise.all([
      get(child(dbRef, `articles/${date}`)),
      get(child(dbRef, `clusters/${date}`)),
      get(child(dbRef, `trends/${date}`)),
      get(child(dbRef, `digest/${date}`)),
    ]);

    allArticles = articlesSnap.exists() ? articlesSnap.val() : {};
    allClusters = clustersSnap.exists()
      ? (Array.isArray(clustersSnap.val()) ? clustersSnap.val() : Object.values(clustersSnap.val()))
      : [];
    const trends = trendsSnap.exists()
      ? (Array.isArray(trendsSnap.val()) ? trendsSnap.val() : Object.values(trendsSnap.val()))
      : [];
    const digest = digestSnap.exists() ? digestSnap.val() : null;

    renderDigest(digest);
    renderStats(allArticles, allClusters, trends);
    renderTrends(trends);
    renderClusters(allArticles, allClusters, currentFilter);
    updateNextBtn(date);

    if (digest?.updatedAt) {
      const dt = new Date(digest.updatedAt);
      document.getElementById("updatedAt").textContent =
        `Cập nhật lúc ${dt.toLocaleTimeString("vi-VN", {hour:"2-digit",minute:"2-digit"})} ngày ${dt.toLocaleDateString("vi-VN")}`;
    }

  } catch(e) {
    showToast("Lỗi tải dữ liệu: " + e.message, "error");
  } finally {
    setRefreshing(false);
  }
};

function renderDigest(digest) {
  const banner = document.getElementById("digestBanner");
  if (!digest?.headline) { banner.style.display = "none"; return; }
  banner.style.display = "block";
  document.getElementById("digestHeadline").textContent = digest.headline;
  document.getElementById("digestOverview").textContent = digest.overview || "";
  const pts = document.getElementById("digestPoints");
  pts.innerHTML = (digest.key_points || [])
    .map(p => `<span class="digest-point">${esc(p)}</span>`).join("");
}

function renderStats(articles, clusters, trends) {
  const artList = Object.values(articles);
  document.getElementById("statArticles").textContent = artList.length || "0";
  document.getElementById("statClusters").textContent = clusters.length || "0";
  document.getElementById("statSources").textContent  = new Set(artList.map(a=>a.source)).size || "0";
  document.getElementById("statTrends").textContent   = trends.length || "0";
}

function renderTrends(trends) {
  const el = document.getElementById("trendsContainer");
  if (!trends.length) { el.innerHTML = '<div class="empty-state"><div class="empty-icon">📭</div><div class="empty-title">Chưa có dữ liệu</div></div>'; return; }

  const rankClass = (r) => r===1?"top1":r===2?"top2":r===3?"top3":"";
  el.innerHTML = trends.map(t => `
    <div class="trend-item">
      <div class="trend-rank ${rankClass(t.rank)}">${t.rank}</div>
      <div class="trend-info">
        <div class="trend-topic">${esc(t.topic)}</div>
        <div class="trend-reason">${esc(t.reason||"")}</div>
        <div class="trend-bar"><div class="trend-bar-fill" style="width:${t.score||50}%"></div></div>
      </div>
    </div>`).join("");
}

function renderClusters(articles, clusters, filter) {
  const artArr = Object.values(articles);
  const el = document.getElementById("clustersContainer");

  let filtered = clusters;
  if (filter !== "all") {
    filtered = clusters.filter(c => {
      const idxs = Array.isArray(c.articles) ? c.articles : [];
      const relevant = artArr.filter(a => idxs.includes(a.articleIndex));
      return relevant.some(a => a.cat === filter);
    });
  }

  if (!filtered.length) {
    el.innerHTML = `<div class="empty-state"><div class="empty-icon">🗞️</div><div class="empty-title">Không có tin trong mục này</div></div>`;
    return;
  }

  const sorted = [...filtered].sort((a,b) => (b.importance||0)-(a.importance||0));

  el.innerHTML = sorted.map((c, ci) => {
    const idxs = Array.isArray(c.articles) ? c.articles : [];
    const relArts = artArr.filter(a => idxs.includes(a.articleIndex));

    const articlesHtml = relArts.map(a => {
      // DEBUG: Log bài EN
      if (a.lang === "en") {
        console.log("🔍 Bài EN:", {
          source: a.source,
          title: a.title,
          title_vi: a.title_vi,
          hasTitleVi: !!a.title_vi
        });
      }
      
      const displayTitle = a.title_vi ? a.title_vi : a.title;
      
      return `
      <div class="article-item">
        <a class="article-title" href="${esc(a.url)}" target="_blank" rel="noopener">${esc(displayTitle)}</a>
        <div class="article-meta">
          <span class="cat-badge cat-${a.cat}">${catLabel(a.cat)}</span>
          <span>${esc(a.source)}</span>
        </div>
      </div>`;
    }).join("");

    return `
      <div class="cluster-card">
        <div class="cluster-header" onclick="toggleCluster(${ci})">
          <div class="cluster-importance">${c.importance||"?"}</div>
          <div>
            <div class="cluster-title">${esc(c.topic)}</div>
            <div class="cluster-summary">${esc(c.summary||"")}</div>
          </div>
          <div class="cluster-toggle" id="ct${ci}">⌄</div>
        </div>
        <div class="cluster-articles" id="ca${ci}">
          ${articlesHtml}
        </div>
      </div>`;
  }).join("");
}

window.setFilter = function(f, btn) {
  currentFilter = f;
  document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  renderClusters(allArticles, allClusters, f);
};

window.toggleCluster = function(ci) {
  const articles = document.getElementById("ca" + ci);
  const toggle   = document.getElementById("ct" + ci);
  const open = articles.classList.toggle("open");
  toggle.classList.toggle("open", open);
};

window.copyShareLink = function() {
  const url = `${location.origin}${location.pathname}?date=${currentDate}`;
  document.getElementById("shareUrl").value = url;
  navigator.clipboard.writeText(url).then(() => {
    const btn = document.getElementById("btnCopy");
    btn.textContent = "✓ Đã copy";
    btn.classList.add("copied");
    setTimeout(() => { btn.textContent = "Copy"; btn.classList.remove("copied"); }, 2000);
  });
};

function esc(s) {
  if (!s) return "";
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}
function catLabel(c) {
  return c === "vn" ? "VN" : c === "world" ? "Quốc tế" : "Kinh tế";
}
function setRefreshing(on) {
  const btn  = document.getElementById("btnRefresh");
  const icon = document.getElementById("refreshIcon");
  btn.classList.toggle("loading", on);
  icon.classList.toggle("spinner", on);
  icon.textContent = on ? "↻" : "↻";
}
function updateNextBtn(date) {
  document.getElementById("btnNextDay").disabled = date >= todayStr();
}
function showToast(msg, type="success") {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.className = `toast ${type} show`;
  setTimeout(() => t.classList.remove("show"), 3000);
}

window.showToast = showToast;
</script>
</body>
</html>
